```html
<!DOCTYPE html>
<html>
<head>
<title>Company Knowledge Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#eef1f5;
display:flex;
height:100vh;
}

.hidden{
display:none;
}

.sidebar{
width:240px;
background:#1f2d3d;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:14px 20px;
text-align:left;
cursor:pointer;
font-size:14px;
}

.sidebar button:hover{
background:#324a63;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.container{
padding:25px;
overflow-y:auto;
flex:1;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.search{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;
}

input, textarea{
width:100%;
padding:8px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button.publish{
background:#1f2d3d;
color:white;
border:none;
padding:10px 14px;
border-radius:5px;
cursor:pointer;
}

button.publish:hover{
background:#324a63;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="loadSection('home')">Home</button>
<button onclick="loadSection('contacts')">Contacts & Links</button>
<button onclick="loadSection('updates')">Updates</button>
<button onclick="loadSection('uw_guidelines')">UW & Guidelines</button>
<button onclick="loadSection('payments')">Payments Change</button>
<button onclick="loadSection('retention')">Retention & Cancellation</button>
<button onclick="loadSection('evertrust')">Evertrust Files</button>
<button onclick="loadSection('tools')">Extra Tools</button>

</div>

<div class="main">

<header>
<div id="sectionTitle">Home</div>
<div id="userInfo">Admin</div>
</header>

<div class="container">

<input
class="search"
id="searchInput"
placeholder="Search..."
oninput="searchPosts()"
/>

<div id="adminPanel" class="card">

<h3>Create Post</h3>

<input id="postTitle" placeholder="Title">

<textarea id="postContent" placeholder="Content"></textarea>

<button class="publish" onclick="createPost()">Publish</button>

</div>

<div id="postsContainer"></div>

</div>
</div>

<script>

let currentSection = "home"
let posts = []

function loadSection(section){

currentSection = section
document.getElementById("sectionTitle").innerText = section.replace("_"," ")

renderPosts()

}

function createPost(){

const title = document.getElementById("postTitle").value
const content = document.getElementById("postContent").value

if(!title || !content){
alert("Fill all fields")
return
}

posts.push({
title:title,
content:content,
section:currentSection
})

document.getElementById("postTitle").value=""
document.getElementById("postContent").value=""

renderPosts()

}

function renderPosts(){

const container = document.getElementById("postsContainer")

container.innerHTML=""

posts
.filter(p=>p.section===currentSection)
.forEach(post=>{

container.innerHTML += `
<div class="card">
<h3>${post.title}</h3>
<p>${post.content}</p>
</div>
`

})

}

function searchPosts(){

const term = document.getElementById("searchInput").value.toLowerCase()

const container = document.getElementById("postsContainer")

container.innerHTML=""

posts
.filter(p => p.section===currentSection)
.filter(p => 
p.title.toLowerCase().includes(term) ||
p.content.toLowerCase().includes(term)
)
.forEach(post=>{

container.innerHTML += `
<div class="card">
<h3>${post.title}</h3>
<p>${post.content}</p>
</div>
`

})

}

</script>

</body>
</html>
