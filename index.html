```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Knowledge Hub V4</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,Arial;
background:linear-gradient(135deg,#c7d2fe,#bae6fd);
}

/* LOGIN PAGE */

.login{
width:360px;
margin:120px auto;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
height:100%;
width:240px;
background:linear-gradient(180deg,#1e293b,#020617);
color:white;
padding:25px;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
background:#334155;
color:white;
cursor:pointer;
}

/* MAIN */

.content{
margin-left:260px;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search{
width:400px;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
margin-bottom:20px;
}

/* BUTTON */

.btn{
padding:10px 16px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:10px;
}

/* TAG */

.tag{
display:inline-block;
background:#e0f2fe;
color:#0369a1;
padding:6px 12px;
border-radius:999px;
font-size:12px;
margin-right:6px;
}

/* PIN */

.pin{
color:#f59e0b;
font-weight:bold;
}

/* DROP ZONE */

.drop{
border:2px dashed #94a3b8;
padding:25px;
border-radius:14px;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div id="app"></div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig={

apiKey:"AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain:"affiliate-relations-17687.firebaseapp.com",
projectId:"affiliate-relations-17687",
storageBucket:"affiliate-relations-17687.firebasestorage.app"

}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.firestore()
const storage=firebase.storage()

let editor
let uploadedFile=""

/* LOGIN PAGE */

function showLogin(){

document.getElementById("app").innerHTML=`

<div class="login">

<h2>Knowledge Hub</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="emailLogin()">Login</button>

<br><br>

<button class="btn" onclick="googleLogin()">Google Login</button>

</div>

`

}

/* EMAIL LOGIN */

function emailLogin(){

const email=document.getElementById("email").value
const pass=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,pass)

}

/* GOOGLE LOGIN */

function googleLogin(){

const provider=new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)

}

/* AUTH STATE */

auth.onAuthStateChanged(user=>{

if(user){

loadApp(user)

}else{

showLogin()

}

})

/* MAIN APP */

function loadApp(user){

document.getElementById("app").innerHTML=`

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="home()">Home</button>
<button onclick="analytics()">Analytics</button>
<button onclick="tools()">Agent Tools</button>
<button onclick="files()">Files</button>

</div>

<div class="content">

<div class="topbar">

<input class="search" id="search" placeholder="Search knowledge..." oninput="search()">

<div>

${user.email}

<button class="btn" onclick="logout()">Logout</button>

</div>

</div>

<div id="main"></div>

</div>

`

home()

}

/* LOGOUT */

function logout(){

auth.signOut()

showLogin()

}

/* HOME */

function home(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Create Post</h3>

<input id="title" placeholder="Title">

<input id="tags" placeholder="#contracts #payments">

<label><input type="checkbox" id="pin"> Pin post</label>

<div id="editor" style="height:200px"></div>

<div id="drop" class="drop">Drag file here</div>

<button class="btn" onclick="createPost()">Publish</button>

</div>

<div id="posts"></div>

`

editor=new Quill("#editor",{theme:"snow"})

setupDrop()

loadPosts()

}

/* CREATE POST */

function createPost(){

const title=document.getElementById("title").value
const content=editor.root.innerHTML
const tags=document.getElementById("tags").value.split(" ")
const pin=document.getElementById("pin").checked

db.collection("posts").add({

title,
content,
tags,
pin,
file:uploadedFile,
date:Date.now()

})

}

/* LOAD POSTS */

function loadPosts(){

db.collection("posts").orderBy("date","desc")

.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

const p=doc.data()

let tags=""

p.tags.forEach(t=>{

tags+=`<span class="tag">${t}</span>`

})

html+=`

<div class="card">

<h3>${p.pin ? "📌 " : ""}${p.title}</h3>

<div>${p.content}</div>

${tags}

<br><br>

${p.file ? `<a href="${p.file}" target="_blank">Attachment</a>` : ""}

<br><br>

<button onclick="deletePost('${doc.id}')">Delete</button>

<button onclick="editPost('${doc.id}')">Edit</button>

</div>

`

})

document.getElementById("posts").innerHTML=html

})

}

/* DELETE */

function deletePost(id){

db.collection("posts").doc(id).delete()

}

/* EDIT */

function editPost(id){

const newTitle=prompt("New title")

db.collection("posts").doc(id).update({

title:newTitle

})

}

/* SEARCH */

function search(){

const q=document.getElementById("search").value.toLowerCase()

db.collection("posts").get().then(s=>{

let html=""

s.forEach(doc=>{

const p=doc.data()

if(

p.title.toLowerCase().includes(q) ||
p.content.toLowerCase().includes(q)

){

html+=`

<div class="card">

<h3>${p.title}</h3>

<div>${p.content}</div>

</div>

`

}

})

document.getElementById("posts").innerHTML=html

})

}

/* FILE UPLOAD */

function setupDrop(){

const drop=document.getElementById("drop")

drop.addEventListener("dragover",e=>e.preventDefault())

drop.addEventListener("drop",e=>{

e.preventDefault()

const file=e.dataTransfer.files[0]

const ref=storage.ref("uploads/"+file.name)

ref.put(file).then(()=>{

ref.getDownloadURL().then(url=>{

uploadedFile=url

alert("File uploaded")

})

})

})

}

/* ANALYTICS */

function analytics(){

db.collection("posts").get().then(s=>{

document.getElementById("main").innerHTML=`

<div class="card">

<h2>Analytics</h2>

<p>Total Posts: ${s.size}</p>

</div>

`

})

}

/* TOOLS */

function tools(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Debt Calculator</h3>

<input id="debt" placeholder="Debt amount">

<button class="btn" onclick="calc()">Calculate</button>

<div id="result"></div>

</div>

`

}

function calc(){

const d=document.getElementById("debt").value

document.getElementById("result").innerHTML=

"Estimated Monthly: $" + (d*0.03).toFixed(2)

}

/* FILE PAGE */

function files(){

document.getElementById("main").innerHTML=`

<div class="card">

<h2>File Center</h2>

<p>Files appear inside posts.</p>

</div>

`

}

</script>

</body>
</html>
```
