<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Knowledge Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
transition:0.25s;
}

/* HEADER */

header{
background:#2e5aac;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:18px;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:40px;
}

/* TOOL CARD */

.tool{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* BUTTON */

button{
padding:8px 14px;
border:none;
background:#e74c3c;
color:white;
border-radius:5px;
cursor:pointer;
}

/* PROFILE AREA */

.profileArea{
display:flex;
align-items:center;
gap:20px;
position:relative;
}

/* PROFILE */

.profile{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.profile img{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

/* PROFILE INFO */

.profileInfo{
font-size:13px;
}

.role{
font-size:11px;
color:#d6d6d6;
}

/* DROPDOWN */

.dropdown{
position:absolute;
right:0;
top:60px;
background:white;
border-radius:8px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
padding:15px;
display:none;
min-width:200px;
color:#333;
}

.dropdown button{
width:100%;
margin-top:10px;
padding:8px;
border:none;
background:#1e4fa1;
color:white;
border-radius:6px;
cursor:pointer;
}

.dropdown.show{
display:block;
}

/* DARK MODE SWITCH */

.switch{
position:relative;
display:inline-block;
width:44px;
height:24px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
border-radius:24px;
transition:.3s;
}

.slider:before{
position:absolute;
content:"";
height:18px;
width:18px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#1e4fa1;
}

input:checked + .slider:before{
transform:translateX(20px);
}

/* DARK MODE */

.dark{
background:#1e293b;
color:white;
}

.dark .tool{
background:#334155;
}

.dark header{
background:#0f172a;
}

</style>

</head>

<body>

<header>

<div class="logo">
Knowledge Hub
</div>

<div class="profileArea">

<label class="switch">
<input type="checkbox" id="darkToggle">
<span class="slider"></span>
</label>

<div class="profile" id="profileBtn">

<img id="agentAvatar" src="https://i.imgur.com/6VBx3io.png">

<div class="profileInfo">
<div id="agentName">Agent</div>
<div class="role" id="accessLevel">Agent</div>
</div>

</div>

<div class="dropdown" id="profileDropdown">

<div id="agentEmail"></div>

<hr>

<button id="logoutBtn">Logout</button>

</div>

</div>

</header>

<div class="container">

<div class="tool">
<h3>Agent Tools Dashboard</h3>
<p>This is your internal tools workspace.</p>
</div>

<div class="tool">
<h3>More Tools Coming</h3>
<p>Wheel spinner, calculators, CRM tools and automations will appear here.</p>
</div>

</div>

<script type="module" src="app.js"></script>

<script>

/* PROFILE DROPDOWN */

const profileBtn = document.getElementById("profileBtn")
const dropdown = document.getElementById("profileDropdown")

profileBtn.onclick = () => {

dropdown.classList.toggle("show")

}

/* CLOSE DROPDOWN WHEN CLICK OUTSIDE */

window.onclick = function(event){

if(!event.target.closest(".profileArea")){
dropdown.classList.remove("show")
}

}

/* DARK MODE */

const toggle = document.getElementById("darkToggle")

toggle.addEventListener("change",()=>{

document.body.classList.toggle("dark")

})

</script>

</body>
</html>
