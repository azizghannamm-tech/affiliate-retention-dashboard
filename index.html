<!DOCTYPE html>
<html>
<head>
<title>Affiliate Relations Knowledge Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#eef1f5;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#1f2d3d;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:14px 20px;
text-align:left;
cursor:pointer;
font-size:14px;
}

.sidebar button:hover{
background:#324a63;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.container{
padding:25px;
overflow-y:auto;
}

/* CARDS */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.card h3{
margin-top:0;
}

/* SEARCH */

.search{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:20px;
}

/* ADMIN PANEL */

.admin{
background:#fff7e6;
border:1px solid #ffd27a;
}

textarea{
width:100%;
height:100px;
margin-top:10px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button.publish{
background:#2d8cff;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button.publish:hover{
background:#1f6de0;
}

.hidden{
display:none;
}

.loginBtn{
background:#2d8cff;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="loadSection('home')">Home</button>
<button onclick="loadSection('contacts')">Contacts & Links</button>
<button onclick="loadSection('updates')">Updates</button>
<button onclick="loadSection('uw_guidelines')">UW & Guidelines</button>
<button onclick="loadSection('payments')">Payments Change</button>
<button onclick="loadSection('retention')">Retention & Cancellation</button>
<button onclick="loadSection('evertrust')">Evertrust Files</button>
<button onclick="loadSection('tools')">Extra Tools</button>

</div>

<div class="main">

<header>

<div id="sectionTitle">Home</div>

<div>
<span id="userInfo">Not logged in</span>
<button class="loginBtn" onclick="login()">Google Login</button>
</div>

</header>

<div class="container">

<input
class="search"
id="searchInput"
placeholder="Search knowledge..."
oninput="searchPosts()"
/>

<div id="adminPanel" class="card admin hidden">

<h3>Create Post</h3>

<input id="postTitle" placeholder="Title">

<textarea id="postContent" placeholder="Content"></textarea>

<button class="publish" onclick="createPost()">Publish</button>

</div>

<div id="postsContainer"></div>

</div>
</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain: "affiliate-relations-17687.firebaseapp.com",
projectId: "affiliate-relations-17687",
storageBucket: "affiliate-relations-17687.firebasestorage.app",
messagingSenderId: "642027131905",
appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let currentSection="home";
let allPosts=[];


/* LOGIN */

function login(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

}


/* AUTH STATE */

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("userInfo").innerText=user.email;

/* ADMIN EMAIL */

if(user.email==="azizghannamm@gmail.com"){

document.getElementById("adminPanel").classList.remove("hidden");

}

}

loadPosts();

});


/* LOAD SECTION */

function loadSection(section){

currentSection=section;

document.getElementById("sectionTitle").innerText=section;

loadPosts();

}


/* REALTIME POSTS */

function loadPosts(){

db.collection("posts")
.where("section","==",currentSection)
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

const container=document.getElementById("postsContainer");

container.innerHTML="";

allPosts=[];

snapshot.forEach(doc=>{

const data=doc.data();

allPosts.push(data);

container.innerHTML+=`

<div class="card">

<h3>${data.title}</h3>

<p>${data.content}</p>

</div>

`;

});

});

}


/* CREATE POST */

function createPost(){

const title=document.getElementById("postTitle").value;
const content=document.getElementById("postContent").value;

if(!title || !content) return;

db.collection("posts").add({

title:title,
content:content,
section:currentSection,
createdAt:firebase.firestore.FieldValue.serverTimestamp()

});

document.getElementById("postTitle").value="";
document.getElementById("postContent").value="";

}


/* SEARCH */

function searchPosts(){

const text=document.getElementById("searchInput").value.toLowerCase();

const container=document.getElementById("postsContainer");

container.innerHTML="";

allPosts.forEach(p=>{

if(

p.title.toLowerCase().includes(text) ||
p.content.toLowerCase().includes(text)

){

container.innerHTML+=`

<div class="card">

<h3>${p.title}</h3>

<p>${p.content}</p>

</div>

`;

}

});

}

</script>

</body>
</html>
