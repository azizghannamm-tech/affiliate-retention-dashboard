```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{

opacity:1;

}

width:50px;
margin-left:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="pointer"></div>

<canvas id="wheel" width="440" height="440"></canvas>

<br>
<button onclick="spin()">SPIN</button>

<div id="winner"></div>

<div class="controls">

<input id="nameInput" placeholder="Add name">
<input id="weightInput" class="weightBox" placeholder="w">
<button onclick="addName()">Add</button>

<br>

<textarea id="bulkInput" placeholder="Paste names here (one per line)"></textarea>
<br>
<button onclick="addBulk()">Add List</button>

<div class="nameList" id="nameList"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let names=[
{name:"Chase",weight:1},
{name:"Douglas",weight:1},
{name:"Valantine",weight:1},
{name:"Raymond",weight:1},
{name:"Flynn",weight:1},
{name:"Rory",weight:1},
{name:"Juliana",weight:1},
{name:"Curtis",weight:1},
{name:"Felix",weight:1}
]

const colors=[
"#3b82f6",
"#22c55e",
"#a855f7",
"#f97316",
"#06b6d4"
]

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

const center=canvas.width/2
const radius=center-10

let rotation=0
let spinning=false

const winSound=new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3")

function expandedNames(){
let list=[]
names.forEach(n=>{
for(let i=0;i<n.weight;i++){
list.push(n.name)
}
})
return list
}

function drawWheel(){

let list=expandedNames()

ctx.clearRect(0,0,canvas.width,canvas.height)

let slice=(2*Math.PI)/list.length

for(let i=0;i<list.length;i++){

let angle=i*slice

ctx.beginPath()
ctx.moveTo(center,center)
ctx.arc(center,center,radius,angle,angle+slice)
ctx.fillStyle=colors[i%colors.length]
ctx.fill()

ctx.save()

ctx.translate(center,center)
ctx.rotate(angle+slice/2)

ctx.fillStyle="white"
ctx.font="bold 14px Arial"
ctx.textAlign="right"

ctx.fillText(list[i],radius-15,5)

ctx.restore()

}

}

function spin(){

if(spinning) return

spinning=true

document.getElementById("winner").classList.remove("show")

let spins=Math.random()*6+7
let target=rotation+spins*2*Math.PI

let duration=5000
let start=performance.now()
let startRot=rotation

function animate(t){

let progress=Math.min((t-start)/duration,1)
let ease=1-Math.pow(1-progress,3)

rotation=startRot+(target-startRot)*ease

ctx.setTransform(1,0,0,1,0,0)
ctx.translate(center,center)
ctx.rotate(rotation)
ctx.translate(-center,-center)

drawWheel()

if(progress<1){

requestAnimationFrame(animate)

}else{

spinning=false

let list=expandedNames()
let slice=(2*Math.PI)/list.length

let index=Math.floor(list.length-(rotation%(2*Math.PI))/slice)%list.length

let winner=list[index]

let winnerBox=document.getElementById("winner")

winnerBox.innerText="🏆 "+winner+" 🏆"
winnerBox.classList.add("show")

winSound.play()

confetti({
particleCount:200,
spread:100,
origin:{y:.6}
})

}

}

requestAnimationFrame(animate)

}

canvas.addEventListener("click",spin)

function addName(){

let name=document.getElementById("nameInput").value.trim()
let weight=parseInt(document.getElementById("weightInput").value)||1

if(!name) return

names.push({name,weight})

document.getElementById("nameInput").value=""
document.getElementById("weightInput").value=""

renderList()
drawWheel()

}

function addBulk(){

let text=document.getElementById("bulkInput").value

text.split("\n").forEach(n=>{
if(n.trim()){
names.push({name:n.trim(),weight:1})
}
})

document.getElementById("bulkInput").value=""

renderList()
drawWheel()

}

function removeName(name){

names=names.filter(n=>n.name!==name)

renderList()
drawWheel()

}

function renderList(){

let list=document.getElementById("nameList")
list.innerHTML=""

names.forEach(n=>{

let tag=document.createElement("div")
tag.className="tag"
tag.innerText=n.name+" ("+n.weight+") ✕"

tag.onclick=()=>removeName(n.name)

list.appendChild(tag)

})

}

renderList()
drawWheel()

</script>

</body>
</html>
