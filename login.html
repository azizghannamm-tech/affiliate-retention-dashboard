<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agent Login</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:340px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.loginBtn{
background:#2e5aac;
color:white;
}

.googleBtn{
background:white;
color:#444;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.switch{
margin-top:15px;
font-size:14px;
color:#2e5aac;
cursor:pointer;
}

</style>

</head>

<body>

<div class="loginBox">

<h2 id="formTitle">Agent Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="loginBtn" id="loginBtn">Login</button>

<button class="loginBtn" id="signupBtn" style="display:none;">
Create Account
</button>

<button class="googleBtn" id="googleBtn">

<img 
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
style="width:18px;"
>

Continue with Google

</button>

<p id="error" style="color:red;"></p>

<p class="switch" id="switchText">
Don't have an account? Sign up
</p>

</div>

<script type="module" src="app.js"></script>

<script>

let isLogin=true;

document.getElementById("switchText").onclick = function(){

isLogin=!isLogin;

if(isLogin){

document.getElementById("formTitle").innerText="Agent Login";
document.getElementById("loginBtn").style.display="block";
document.getElementById("signupBtn").style.display="none";
document.getElementById("switchText").innerText="Don't have an account? Sign up";

}else{

document.getElementById("formTitle").innerText="Create Account";
document.getElementById("loginBtn").style.display="none";
document.getElementById("signupBtn").style.display="block";
document.getElementById("switchText").innerText="Already have an account? Login";

}

};

</script>

</body>
</html>
