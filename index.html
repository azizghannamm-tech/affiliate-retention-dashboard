<!DOCTYPE html>
<html>
<head>

<title>Knowledge Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Quill Editor -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
}

header{
background:#0f172a;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.logo{
font-size:20px;
font-weight:700;
}

.user{
display:flex;
gap:10px;
align-items:center;
}

.logout{
background:#ef4444;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
}

.navbar{
display:flex;
gap:10px;
padding:12px 20px;
background:#1e293b;
flex-wrap:wrap;
}

.navbar button{

background:#334155;
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
color:white;
font-size:14px;

}

.navbar button:hover{
background:#6366f1;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:20px;
}

.card{

background:#1e293b;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.card h3{
margin-top:0;
}

.tags{
color:#94a3b8;
font-size:13px;
margin-top:10px;
}

button.publish{

background:#6366f1;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:15px;

}

#editor{
background:white;
color:black;
border-radius:10px;
}

#dropZone{

border:2px dashed #6366f1;
padding:20px;
border-radius:12px;
margin-top:10px;
text-align:center;

}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<div class="logo">Knowledge Hub</div>

<div class="user">

<span id="userEmail"></span>

<button class="logout" onclick="logout()">Logout</button>

</div>

</header>


<div class="navbar">

<button onclick="openSection('home')">Home</button>
<button onclick="openSection('contacts')">Contacts</button>
<button onclick="openSection('updates')">Updates</button>
<button onclick="openSection('uw')">UW Guidelines</button>
<button onclick="openSection('payments')">Payments</button>
<button onclick="openSection('retention')">Retention</button>
<button onclick="openSection('evertrust')">Evertrust</button>
<button onclick="openSection('tools')">Agent Tools</button>
<button onclick="openSection('files')">Files</button>
<button onclick="analytics()">Analytics</button>

</div>


<div class="container">

<input
class="search"
placeholder="Search knowledge..."
oninput="searchPosts(this.value)"
>

<div class="card">

<h3>Create Knowledge Post</h3>

<input id="title" placeholder="Title">

<input id="tags" placeholder="#contracts #payments">

<div id="editor"></div>

<div id="dropZone">

Drag file here (PDF / contracts)

</div>

<button class="publish" onclick="createPost()">

Publish

</button>

</div>


<div id="posts"></div>

</div>



<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>


<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>


<script>

const firebaseConfig = {

apiKey:"AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain:"affiliate-relations-17687.firebaseapp.com",
projectId:"affiliate-relations-17687",
storageBucket:"affiliate-relations-17687.firebasestorage.app",
appId:"1:642027131905:web:5f0076ee7b34578b9f9c00"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const storage = firebase.storage()
const auth = firebase.auth()

let currentSection="home"
let uploadedFile=null
let allPosts=[]


const quill = new Quill('#editor',{
theme:'snow'
})


auth.onAuthStateChanged(user=>{

if(!user){

location.href="login.html"

}

document.getElementById("userEmail").innerText=user.email

loadPosts()

})



function logout(){

auth.signOut()

location.href="login.html"

}



function openSection(section){

currentSection=section

loadPosts()

}



function createPost(){

const title=document.getElementById("title").value
const tags=document.getElementById("tags").value
const content=quill.root.innerHTML

let fileURL=null

const savePost=(url)=>{

db.collection("posts").add({

title,
content,
tags,
file:url,
section:currentSection,
date:Date.now()

}).then(()=>{

document.getElementById("title").value=""
document.getElementById("tags").value=""
quill.setText("")

loadPosts()

})

}


if(uploadedFile){

const ref=storage.ref().child("files/"+uploadedFile.name)

ref.put(uploadedFile).then(snapshot=>{

snapshot.ref.getDownloadURL().then(url=>{

savePost(url)

})

})

}else{

savePost(null)

}

}



function loadPosts(){

db.collection("posts")

.where("section","==",currentSection)

.orderBy("date","desc")

.onSnapshot(snapshot=>{

const container=document.getElementById("posts")

container.innerHTML=""

allPosts=[]

snapshot.forEach(doc=>{

const p=doc.data()

allPosts.push(p)

container.innerHTML+=`

<div class="card">

<h3>${p.title}</h3>

<div>${p.content}</div>

<div class="tags">${p.tags||""}</div>

${p.file ? `<a href="${p.file}" target="_blank">Download File</a>` : ""}

</div>

`

})

})

}



function searchPosts(text){

text=text.toLowerCase()

const container=document.getElementById("posts")

container.innerHTML=""

allPosts.forEach(p=>{

if(

p.title.toLowerCase().includes(text) ||

p.tags?.toLowerCase().includes(text) ||

p.content.toLowerCase().includes(text)

){

container.innerHTML+=`

<div class="card">

<h3>${p.title}</h3>

<div>${p.content}</div>

<div class="tags">${p.tags||""}</div>

</div>

`

}

})

}



const dropZone=document.getElementById("dropZone")

dropZone.addEventListener("dragover",e=>{

e.preventDefault()

})

dropZone.addEventListener("drop",e=>{

e.preventDefault()

uploadedFile=e.dataTransfer.files[0]

dropZone.innerText=uploadedFile.name

})

</script>

</body>
</html>
