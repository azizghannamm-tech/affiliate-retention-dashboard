<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Agent Tools</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
}

header{
background:#2e5aac;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:40px;
}

.tool{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

button{
padding:8px 14px;
border:none;
background:#e74c3c;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">
<b>Knowledge Hub</b>
</div>

<div class="profileArea">

<label class="switch">
<input type="checkbox" id="darkToggle">
<span class="slider"></span>
</label>

<div class="profile" id="profileBtn">

<img id="agentAvatar">

<div class="profileInfo">
<div id="agentName"></div>
<div class="role" id="accessLevel"></div>
</div>

</div>

<div class="dropdown" id="profileDropdown">

<div id="agentEmail"></div>

<hr>

<button id="logoutBtn">Logout</button>

</div>

</div>

</header>

<div class="container">

<div class="tool">
<h3>Tool Example</h3>
<p>This is where your agent tools will go.</p>
</div>

<div class="tool">
<h3>Another Tool</h3>
<p>You can add calculators, scripts, or dashboards here.</p>
</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
