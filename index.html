<!DOCTYPE html>
<html>
<head>
  <title>Company Knowledge Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial; background:#f4f6f9; }
    header {
      background:#1f2d3d;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .container { padding:30px; max-width:900px; margin:auto; }
    .hidden { display:none; }
    .card {
      background:white;
      padding:20px;
      margin-bottom:20px;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
    button {
      padding:8px 14px;
      background:#1f2d3d;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }
    button:hover { background:#324a63; }
    input, textarea {
      width:100%;
      padding:8px;
      margin:6px 0;
    }
  </style>
</head>
<body>

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="loadSection('home')">Home</button>
<button onclick="loadSection('contacts')">Contacts & Links</button>
<button onclick="loadSection('updates')">Updates</button>
<button onclick="loadSection('uw_guidelines')">UW & Guidelines</button>
<button onclick="loadSection('payments')">Payments Change</button>
<button onclick="loadSection('retention')">Retention & Cancellation</button>
<button onclick="loadSection('evertrust')">Evertrust Files</button>
<button onclick="loadSection('tools')">Extra Tools</button>

</div>

<div class="main">

<header>
<div id="sectionTitle">Home</div>
<div id="userInfo"></div>
</header>

<div class="container">

<input
class="search"
id="searchInput"
placeholder="Search..."
oninput="searchPosts()"
/>

<div id="adminPanel" class="card hidden">

<h3>Create Post</h3>

<input id="postTitle" placeholder="Title">

<textarea id="postContent" placeholder="Content"></textarea>

<button onclick="createPost()">Publish</button>

</div>

<div id="postsContainer"></div>

</div>
</div>

</body></html>
