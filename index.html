<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Knowledge Hub V2</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
position:fixed;
width:240px;
height:100%;
background:#16243b;
color:white;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
border:none;
background:#223554;
color:white;
cursor:pointer;
}

.content{
margin-left:260px;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

#dropZone{
border:2px dashed #aaa;
padding:30px;
text-align:center;
background:#fafafa;
}

.tags{
margin-top:10px;
color:#3b82f6;
}

.tool{
padding:15px;
background:white;
margin-bottom:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="loadSection('home')">Home</button>
<button onclick="loadSection('contacts')">Contacts & Links</button>
<button onclick="loadSection('updates')">Updates</button>
<button onclick="loadSection('uw')">UW Guidelines</button>
<button onclick="loadSection('payments')">Payments</button>
<button onclick="loadSection('retention')">Retention</button>
<button onclick="loadSection('files')">Files</button>
<button onclick="loadSection('tools')">Agent Tools</button>
<button onclick="loadSection('analytics')">Analytics</button>

</div>

<div class="content">

<div class="topbar">
<div>
<input id="search" placeholder="Search knowledge">
<button onclick="searchPosts()">Search</button>
</div>

<div>
<span id="userEmail"></span>
<button onclick="googleLogin()">Google Login</button>
</div>
</div>

<div id="main"></div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {

apiKey:"AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain:"affiliate-relations-17687.firebaseapp.com",
projectId:"affiliate-relations-17687",
storageBucket:"affiliate-relations-17687.firebasestorage.app"

};

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()
const storage=firebase.storage()

let editor

function googleLogin(){

const provider=new firebase.auth.GoogleAuthProvider()

firebase.auth().signInWithPopup(provider)

}

firebase.auth().onAuthStateChanged(user=>{

if(user){

document.getElementById("userEmail").innerText=user.email

}

})

function loadSection(section){

if(section==="home"){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Create Post</h3>

<input id="title" placeholder="Title">

<input id="tags" placeholder="#contracts #payments">

<div id="editor" style="height:200px"></div>

<div id="dropZone">Drag file here</div>

<button onclick="createPost()">Publish</button>

</div>

<div id="posts"></div>

`

editor=new Quill('#editor',{theme:'snow'})

loadPosts()

setupDrop()

}

if(section==="tools"){

document.getElementById("main").innerHTML=`

<div class="tool">

<h3>Payment Calculator</h3>

<input id="debt" placeholder="Debt amount">

<button onclick="calc()">Calculate</button>

<div id="result"></div>

</div>

`

}

if(section==="analytics"){

db.collection("posts").get().then(s=>{

document.getElementById("main").innerHTML=`

<div class="card">

<h2>Analytics</h2>

<p>Total Posts: ${s.size}</p>

</div>

`

})

}

}

function createPost(){

const title=document.getElementById("title").value

const content=editor.root.innerHTML

const tags=document.getElementById("tags").value.split(" ")

db.collection("posts").add({

title,
content,
tags,
date:Date.now()

})

}

function loadPosts(){

db.collection("posts").orderBy("date","desc").onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

const p=doc.data()

html+=`

<div class="card">

<h3>${p.title}</h3>

<div>${p.content}</div>

<div class="tags">${p.tags.join(" ")}</div>

</div>

`

})

document.getElementById("posts").innerHTML=html

})

}

function searchPosts(){

const q=document.getElementById("search").value.toLowerCase()

db.collection("posts").get().then(s=>{

let html=""

s.forEach(doc=>{

const p=doc.data()

if(p.title.toLowerCase().includes(q)||p.content.toLowerCase().includes(q)){

html+=`

<div class="card">

<h3>${p.title}</h3>

${p.content}

</div>

`

}

})

document.getElementById("main").innerHTML=html

})

}

function setupDrop(){

const zone=document.getElementById("dropZone")

zone.addEventListener("dragover",e=>{

e.preventDefault()

})

zone.addEventListener("drop",e=>{

e.preventDefault()

const file=e.dataTransfer.files[0]

const ref=storage.ref("files/"+file.name)

ref.put(file)

})

}

function calc(){

const d=document.getElementById("debt").value

document.getElementById("result").innerText="Estimated payment: "+(d*0.03)

}

loadSection("home")

</script>

</body>
</html>
