<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Agent Wheel</title>
<style>
body{background:#0b0b14;color:white;font-family:Arial,Helvetica,sans-serif;text-align:center}
h1{color:#00ffe5;text-shadow:0 0 15px #00ffe5}
#wheelContainer{position:relative;width:520px;margin:30px auto}
canvas{border-radius:50%;box-shadow:0 0 40px #00ffe5,inset 0 0 30px #111;background:#111;cursor:pointer}
textarea{width:90%;max-width:600px;height:120px;padding:10px;border-radius:10px;border:none;margin-top:15px}
button{padding:10px 25px;border:none;border-radius:8px;background:#00ffe5;color:#000;font-weight:bold;cursor:pointer;margin-top:10px}
.panel{background:#151528;padding:15px;border-radius:10px;margin:15px auto;width:90%;max-width:600px}
#winner{font-size:32px;margin-top:20px;color:#00ff9d;text-shadow:0 0 15px #00ff9d}
.history{text-align:left;max-height:150px;overflow:auto;font-size:14px}
input[type=range]{width:250px}
</style>
</head>
<body>
<h1>🎡 Neon Agent Wheel</h1>
<textarea id="agentInput" placeholder="Paste agents. Example:\nJohn\nMike,2\nSarah"></textarea><br>
<button onclick="loadAgents()">Load Agents</button>
<div class="panel">Spin Speed<br><input type="range" id="speed" min="3" max="30" value="12"></div>
<div class="panel"><label><input type="checkbox" id="removeWinner"> Auto remove winner</label></div>
<div id="wheelContainer"><canvas id="wheel" width="500" height="500"></canvas></div>
<div id="winner"></div>
<div class="panel"><b>Last Winners</b><div class="history" id="history"></div></div>
<script>
let agents=[]
let weights=[]
let angle=0
let spinning=false
const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")
function loadAgents(){
let text=document.getElementById("agentInput").value.trim()
localStorage.setItem("agentWheelList",text)
let lines=text.split("\n")
agents=[]
weights=[]
lines.forEach(l=>{let parts=l.split(",");agents.push(parts[0].trim());weights.push(parts[1]?Number(parts[1]):1)})
buildWheel()}
function buildWheel(){
let total=weights.reduce((a,b)=>a+b,0)
let start=0
ctx.clearRect(0,0,500,500)
agents.forEach((name,i)=>{let slice=(weights[i]/total)*Math.PI*2
ctx.beginPath();ctx.moveTo(250,250);ctx.arc(250,250,240,start,start+slice);ctx.fillStyle=`hsl(${i*50},100%,50%)`;ctx.fill()
ctx.save();ctx.translate(250,250);ctx.rotate(start+slice/2);ctx.fillStyle="black";ctx.font="14px Arial";ctx.fillText(name,120,5);ctx.restore()
start+=slice})}
function weightedPick(){let total=weights.reduce((a,b)=>a+b,0);let r=Math.random()*total;for(let i=0;i<agents.length;i++){if(r<weights[i]) return i;r-=weights[i]}}
function spin(){if(spinning||agents.length==0) return;spinning=true
let targetIndex=weightedPick()
let slice=(Math.PI*2)/agents.length
let targetAngle=(Math.PI*2)-(targetIndex*slice)
let spins=6
let final=spins*Math.PI*2+targetAngle
let start=angle
let duration=3000
let startTime=null
function animate(t){if(!startTime) startTime=t;let progress=(t-startTime)/duration;if(progress>1) progress=1
angle=start+(final-start)*progress
ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,500,500);ctx.translate(250,250);ctx.rotate(angle);ctx.translate(-250,-250);buildWheel()
if(progress<1){requestAnimationFrame(animate)}else{finish(targetIndex)}}
requestAnimationFrame(animate)}
function finish(index){spinning=false
let winner=agents[index]
let box=document.getElementById("winner")
box.innerHTML="🏆 "+winner
confetti()
saveHistory(winner)
if(document.getElementById("removeWinner").checked){agents.splice(index,1);weights.splice(index,1);buildWheel()}}
function saveHistory(name){let list=document.getElementById("history");let div=document.createElement("div");div.textContent=name;list.prepend(div)}
function confetti(){for(let i=0;i<80;i++){let c=document.createElement("div");c.style.position="fixed";c.style.width="6px";c.style.height="6px";c.style.background=`hsl(${Math.random()*360},100%,50%)`;c.style.left=Math.random()*100+"vw";c.style.top="-10px";c.style.transition="top 2s linear";document.body.appendChild(c);setTimeout(()=>{c.style.top="100vh"},10);setTimeout(()=>{c.remove()},2000)}}
canvas.addEventListener("click",spin)
window.onload=()=>{let saved=localStorage.getItem("agentWheelList");if(saved){document.getElementById("agentInput").value=saved;loadAgents()}}
</script>
</body>
</html>
