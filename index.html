<!DOCTYPE html>
<html>
<head>

<title>Knowledge Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
font-family:Inter;
margin:0;
background:#ffffff;
color:#111827;
}

header{
background:#0b3d91;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

header button{
background:white;
border:none;
padding:6px 12px;
border-radius:10px;
cursor:pointer;
}

nav{
background:#f8fafc;
padding:12px 20px;
border-bottom:1px solid #e5e7eb;
}

nav button{
background:#e9f0ff;
border:none;
padding:8px 14px;
border-radius:20px;
margin-right:6px;
cursor:pointer;
}

nav button:hover{
background:#2563eb;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.publish-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
}

.dark body{
background:#0f172a;
color:white;
}

.dark nav{
background:#1e293b;
}

.dark .card{
background:#1e293b;
border-color:#334155;
}

</style>

</head>

<body>

<header>

<h2>Knowledge Hub</h2>

<div>

<button onclick="toggleTheme()">🌙</button>

<button onclick="openProfile()">Profile</button>

<button onclick="logout()">Logout</button>

</div>

</header>

<nav>

<button onclick="loadSection('home')">Home</button>
<button onclick="loadSection('contacts')">Contacts</button>
<button onclick="loadSection('updates')">Updates</button>
<button onclick="loadSection('uw_guidelines')">UW Guidelines</button>
<button onclick="loadSection('payments')">Payments</button>
<button onclick="loadSection('retention')">Retention</button>
<button onclick="loadSection('evertrust')">Evertrust</button>
<button onclick="loadSection('tools')">Agent Tools</button>
<button onclick="loadSection('files')">Files</button>
<button onclick="loadSection('analytics')">Analytics</button>

</nav>

<div class="container">

<div id="profile" class="card" style="display:none">

<h2>Agent Profile</h2>

<p><b>Name:</b> <span id="agentName"></span></p>

<p><b>Email:</b> <span id="agentEmail"></span></p>

<p><b>Access Level:</b> <span id="agentRole"></span></p>

</div>

<div id="posts"></div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain: "affiliate-relations-17687.firebaseapp.com",
projectId: "affiliate-relations-17687",
storageBucket: "affiliate-relations-17687.firebasestorage.app",
messagingSenderId: "642027131905",
appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"

};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

const auth = firebase.auth()

auth.onAuthStateChanged(user => {

if(!user){

window.location.href="login.html"

}

})

function logout(){

auth.signOut()

window.location.href="login.html"

}

async function loadSection(section){

document.getElementById("profile").style.display="none"

const container=document.getElementById("posts")

container.innerHTML="Loading..."

const querySnapshot = await db.collection("posts")
.where("section","==",section)
.get()

container.innerHTML=""

querySnapshot.forEach(doc =>{

const post=doc.data()

container.innerHTML+=`

<div class="card">

<h3>${post.title}</h3>

<p>${post.content}</p>

${post.embedHTML ? post.embedHTML : ""}

</div>

`

})

}

function openProfile(){

document.getElementById("profile").style.display="block"

const user=auth.currentUser

document.getElementById("agentEmail").innerText=user.email

db.collection("users")
.doc(user.uid)
.get()
.then(doc=>{

const data=doc.data()

if(data){

document.getElementById("agentName").innerText=data.name
document.getElementById("agentRole").innerText=data.role

}

})

}

function toggleTheme(){

document.documentElement.classList.toggle("dark")

localStorage.setItem(
"theme",
document.documentElement.classList.contains("dark")
)

}

if(localStorage.getItem("theme")==="true"){

document.documentElement.classList.add("dark")

}

</script>

</body>
</html>
