<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:transparent;
}

.container{
text-align:center;
width:520px;
}

.pointer{
width:0;
height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:22px solid #facc15;
margin:auto;
margin-bottom:10px;
}

canvas{
display:block;
margin:auto;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.controls{
margin-top:20px;
}

input{
padding:8px;
width:200px;
border-radius:5px;
border:1px solid #ccc;
}

.nameList{
margin-top:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
}

.tag{
background:#e5e7eb;
padding:4px 8px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

#winner{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#16a34a;
opacity:0;
transform:scale(.6);
transition:.4s;
}

#winner.show{
opacity:1;
transform:scale(1.2);
}

</style>
</head>

<body>

<div class="container">

<div class="pointer"></div>

<canvas id="wheel" width="420" height="420"></canvas>

<br>
<button onclick="spin()">SPIN</button>

<div id="winner"></div>

<div class="controls">

<input id="nameInput" placeholder="Add name">
<button onclick="addName()">Add</button>

<div class="nameList" id="nameList"></div>

</div>

</div>

<script>

let names=[
"Chase",
"Douglas",
"Valantine",
"Raymond",
"Flynn",
"Rory",
"Juliana",
"Curtis",
"Felix"
]

const colors=[
"#3b82f6",
"#22c55e",
"#a855f7",
"#f97316",
"#06b6d4"
]

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

const center=canvas.width/2
const radius=center-10

let rotation=0
let spinning=false

function drawWheel(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let slice=(2*Math.PI)/names.length

for(let i=0;i<names.length;i++){

let angle=i*slice

ctx.beginPath()
ctx.moveTo(center,center)
ctx.arc(center,center,radius,angle,angle+slice)
ctx.fillStyle=colors[i%colors.length]
ctx.fill()

ctx.save()

ctx.translate(center,center)
ctx.rotate(angle+slice/2)

ctx.fillStyle="white"
ctx.font="bold 14px Arial"
ctx.textAlign="right"

ctx.fillText(names[i],radius-15,5)

ctx.restore()

}

}

function spin(){

if(spinning) return

spinning=true

document.getElementById("winner").classList.remove("show")

let spins=Math.random()*6+6
let target=rotation+spins*2*Math.PI

let duration=5000
let start=performance.now()
let startRot=rotation

function animate(t){

let progress=Math.min((t-start)/duration,1)
let ease=1-Math.pow(1-progress,3)

rotation=startRot+(target-startRot)*ease

ctx.setTransform(1,0,0,1,0,0)
ctx.translate(center,center)
ctx.rotate(rotation)
ctx.translate(-center,-center)

drawWheel()

if(progress<1){

requestAnimationFrame(animate)

}else{

spinning=false

let slice=(2*Math.PI)/names.length
let index=Math.floor(names.length-(rotation%(2*Math.PI))/slice)%names.length

let winner=names[index]

let winnerBox=document.getElementById("winner")

winnerBox.innerText="🎉 "+winner+" 🎉"
winnerBox.classList.add("show")

}

}

requestAnimationFrame(animate)

}

function addName(){

let input=document.getElementById("nameInput")
let name=input.value.trim()

if(!name) return

names.push(name)

input.value=""

renderList()
drawWheel()

}

function removeName(name){

names=names.filter(n=>n!==name)

renderList()
drawWheel()

}

function renderList(){

let list=document.getElementById("nameList")
list.innerHTML=""

names.forEach(n=>{

let tag=document.createElement("div")
tag.className="tag"
tag.innerText=n+" ✕"

tag.onclick=()=>removeName(n)

list.appendChild(tag)

})

}

renderList()
drawWheel()

</script>

</body>
</html>
