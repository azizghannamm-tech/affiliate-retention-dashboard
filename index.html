<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Operations Dashboard</title>

<style>

/* PAGE */

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#cfd3d8;
}

/* NAVBAR */

.navbar{
background:#0b1a36;
padding:14px 20px;
display:flex;
gap:30px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:500;
cursor:pointer;
}

/* CONTENT */

.container{
padding:20px;
}

/* POST BOX */

.post-box{
background:#e6e6e6;
padding:15px;
border-radius:10px;
margin-bottom:25px;
}

.post-box textarea{
width:100%;
height:80px;
padding:10px;
border-radius:6px;
border:1px solid #bbb;
resize:none;
}

.post-box button{
margin-top:10px;
background:#2f62d6;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

/* SECTION TITLE */

.section-title{
font-size:22px;
font-weight:bold;
margin:20px 0;
}

/* TIME ZONE GRID */

.time-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.time-card{
color:white;
padding:18px;
border-radius:14px;
width:220px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.time-title{
font-weight:bold;
margin-bottom:8px;
}

.time{
font-size:26px;
font-weight:bold;
}

/* COLORS */

.blue{background:linear-gradient(135deg,#3a5ed8,#223c9a);}
.green{background:linear-gradient(135deg,#1d8f53,#0f6a3b);}
.orange{background:linear-gradient(135deg,#f19a00,#b76500);}
.purple{background:linear-gradient(135deg,#9c4cff,#5b22a8);}
.teal{background:linear-gradient(135deg,#259ed4,#176c9c);}
.red{background:linear-gradient(135deg,#e33030,#9e1c1c);}

/* AGENT DIRECTORY GRID */

#agentDirectoryGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-top:20px;
}

.agentCard{
background:white;
border-radius:12px;
padding:16px;
text-align:center;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
transition:.2s;
}

.agentCard:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.agentAvatar{
width:60px;
height:60px;
border-radius:50%;
margin-bottom:10px;
object-fit:cover;
}

.agentName{
font-weight:600;
}

.agentRole{
font-size:13px;
color:#666;
}

/* RESPONSIVE */

@media(max-width:1200px){
#agentDirectoryGrid{
grid-template-columns:repeat(4,1fr);
}
}

@media(max-width:900px){
#agentDirectoryGrid{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:600px){
#agentDirectoryGrid{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>


<body>

<!-- NAVBAR -->

<div class="navbar">
<a onclick="showTab('home')">Home</a>
<a onclick="showTab('agents')">Agent Directory</a>
<a onclick="showTab('updates')">Updates</a>
</div>

<div class="container">

<!-- HOME TAB -->

<div id="homeTab">

<div class="post-box">
<textarea placeholder="Post an update..."></textarea>
<br>
<button>Post</button>
</div>

<div class="section-title">🌍 Global Operations Time Zones</div>

<div class="time-grid">

<div class="time-card blue">
<div class="time-title">Eastern Time</div>
<div class="time" id="est"></div>
</div>

<div class="time-card green">
<div class="time-title">Central Time</div>
<div class="time" id="cst"></div>
</div>

<div class="time-card orange">
<div class="time-title">Mountain Time</div>
<div class="time" id="mst"></div>
</div>

<div class="time-card purple">
<div class="time-title">Pacific Time</div>
<div class="time" id="pst"></div>
</div>

<div class="time-card teal">
<div class="time-title">Dominican Republic</div>
<div class="time" id="dr"></div>
</div>

<div class="time-card red">
<div class="time-title">Amman · Jordan</div>
<div class="time" id="amman"></div>
</div>

</div>

</div>

<!-- AGENTS TAB -->

<div id="agentsTab" style="display:none">

<h2>Agent Directory</h2>

<div id="agentDirectoryGrid">

<div class="agentCard">
<img class="agentAvatar" src="https://i.pravatar.cc/100?img=1">
<div class="agentName">John Smith</div>
<div class="agentRole">Acquisitions</div>
</div>

<div class="agentCard">
<img class="agentAvatar" src="https://i.pravatar.cc/100?img=2">
<div class="agentName">Maria Lopez</div>
<div class="agentRole">Dispositions</div>
</div>

<div class="agentCard">
<img class="agentAvatar" src="https://i.pravatar.cc/100?img=3">
<div class="agentName">David Chen</div>
<div class="agentRole">Lead Manager</div>
</div>

<div class="agentCard">
<img class="agentAvatar" src="https://i.pravatar.cc/100?img=4">
<div class="agentName">Sarah Johnson</div>
<div class="agentRole">Transaction Coordinator</div>
</div>

<div class="agentCard">
<img class="agentAvatar" src="https://i.pravatar.cc/100?img=5">
<div class="agentName">Omar Khalid</div>
<div class="agentRole">Admin</div>
</div>

</div>

</div>

</div>

<script>

/* TAB SWITCH */

function showTab(tab){

document.getElementById("homeTab").style.display="none"
document.getElementById("agentsTab").style.display="none"

if(tab==="home") document.getElementById("homeTab").style.display="block"
if(tab==="agents") document.getElementById("agentsTab").style.display="block"

}

/* TIME ZONES */

function updateTimes(){

const options={hour:'2-digit',minute:'2-digit',second:'2-digit'}

document.getElementById("est").innerText=new Date().toLocaleTimeString("en-US",{...options,timeZone:"America/New_York"})
document.getElementById("cst").innerText=new Date().toLocaleTimeString("en-US",{...options,timeZone:"America/Chicago"})
document.getElementById("mst").innerText=new Date().toLocaleTimeString("en-US",{...options,timeZone:"America/Denver"})
document.getElementById("pst").innerText=new Date().toLocaleTimeString("en-US",{...options,timeZone:"America/Los_Angeles"})
document.getElementById("dr").innerText=new Date().toLocaleTimeString("en-US",{...options,timeZone:"America/Santo_Domingo"})
document.getElementById("amman").innerText=new Date().toLocaleTimeString("en-US",{...options,timeZone:"Asia/Amman"})

}

setInterval(updateTimes,1000)
updateTimes()

</script>

</body>
</html>
