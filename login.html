<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>

body{
font-family:Inter;
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:14px;
width:300px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h3>Agent Login</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain: "affiliate-relations-17687.firebaseapp.com",
projectId: "affiliate-relations-17687.firebaseapp.com",
storageBucket: "affiliate-relations-17687.firebasestorage.app",
messagingSenderId: "642027131905",
appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"

};

firebase.initializeApp(firebaseConfig)

function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)
.then(()=>{

window.location.href="index.html"

})
.catch(e=>alert(e.message))

}

</script>

</body>
</html>
