
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Knowledge Hub Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}

h2{
margin-bottom:25px;
color:#2e5aac;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
margin-bottom:10px;
}

.loginBtn{
background:#2e5aac;
color:white;
}

.signupBtn{
background:#27ae60;
color:white;
}

.googleBtn{
background:white;
color:#444;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.googleBtn img{
width:18px;
height:18px;
}

#error{
color:red;
font-size:13px;
margin-top:10px;
min-height:18px;
}

</style>

</head>

<body>

<div class="card">

<h2>Knowledge Hub</h2>

<input 
id="email"
type="email"
placeholder="Email"
autocomplete="email"
required
>

<input 
id="password"
type="password"
placeholder="Password"
autocomplete="current-password"
required
>

<button type="button" class="loginBtn" id="loginBtn">
Sign In
</button>

<button type="button" class="signupBtn" id="signupBtn">
Create Account
</button>

<button type="button" class="googleBtn" id="googleBtn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Sign in with Google

</button>

<div id="error"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
