<!DOCTYPE html>
<html>
<head>
<title>Company Knowledge Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#eef1f5;
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#1f2d3d;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:14px 20px;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#324a63;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.container{
padding:25px;
overflow-y:auto;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.search{
width:100%;
padding:10px;
margin-bottom:20px;
}

.hidden{
display:none;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
}

input{
width:100%;
padding:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:8px 14px;
}

</style>

</head>
<body>

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="loadSection('home')">Home</button>
<button onclick="loadSection('contacts')">Contacts & Links</button>
<button onclick="loadSection('updates')">Updates</button>
<button onclick="loadSection('uw_guidelines')">UW & Guidelines</button>
<button onclick="loadSection('payments')">Payments Change</button>
<button onclick="loadSection('retention')">Retention & Cancellation</button>
<button onclick="loadSection('evertrust')">Evertrust Files</button>
<button onclick="loadSection('tools')">Extra Tools</button>

</div>

<div class="main">

<header>
<div id="sectionTitle">Home</div>
<div id="userInfo">Loading...</div>
</header>

<div class="container">

<input
class="search"
id="searchInput"
placeholder="Search..."
oninput="searchPosts()"
/>

<div id="adminPanel" class="card hidden">

<h3>Create Post</h3>

<input id="postTitle" placeholder="Title">

<textarea id="postContent" placeholder="Content"></textarea>

<button onclick="createPost()">Publish</button>

</div>

<div id="postsContainer"></div>

</div>
</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain: "affiliate-relations-17687.firebaseapp.com",
projectId: "affiliate-relations-17687",
storageBucket: "affiliate-relations-17687.firebasestorage.app",
messagingSenderId: "642027131905",
appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let currentSection = "home";
let allPosts = [];

function loadSection(section){

currentSection = section;

document.getElementById("sectionTitle").innerText = section;

loadPosts();

}

function loadPosts(){

db.collection("posts")
.where("section","==",currentSection)
.get()
.then(snapshot=>{

const container = document.getElementById("postsContainer");

container.innerHTML="";

allPosts=[];

snapshot.forEach(doc=>{

const data = doc.data();

allPosts.push(data);

container.innerHTML += `
<div class="card">
<h3>${data.title}</h3>
<p>${data.content}</p>
</div>
`;

});

});

}

function createPost(){

const title = document.getElementById("postTitle").value;
const content = document.getElementById("postContent").value;

db.collection("posts").add({

title:title,
content:content,
section:currentSection,
createdAt:new Date()

}).then(()=>{

loadPosts();

document.getElementById("postTitle").value="";
document.getElementById("postContent").value="";

});

}

function searchPosts(){

const text = document.getElementById("searchInput").value.toLowerCase();

const container = document.getElementById("postsContainer");

container.innerHTML="";

allPosts.forEach(p=>{

if(
p.title.toLowerCase().includes(text) ||
p.content.toLowerCase().includes(text)
){

container.innerHTML += `
<div class="card">
<h3>${p.title}</h3>
<p>${p.content}</p>
</div>
`;

}

});

}

auth.signInAnonymously().then(()=>{

document.getElementById("adminPanel").classList.remove("hidden");
document.getElementById("userInfo").innerText="Logged In";

loadPosts();

});

</script>

</body>
</html>
