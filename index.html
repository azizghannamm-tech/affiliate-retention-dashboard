```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Knowledge Hub</title>

<link rel="stylesheet"
href="dashboard.css">

</head>

<body>


<header class="topBar">

<div class="logo">
Knowledge Hub
</div>

<div class="profileSection">

<img id="agentAvatar"
class="avatar">

<div class="profileInfo">

<div id="agentName">
Agent
</div>

<div id="agentEmail"></div>

<div id="accessLevel"></div>

</div>

<button id="logoutBtn">
Logout
</button>

</div>

</header>


<div class="mainContainer">


<div class="tool">

<h2>Announcements</h2>

<div class="adminOnly">

<input
id="announcements-title"
placeholder="Title"
>

<textarea
id="announcements-content"
placeholder="Content"
></textarea>

<button
onclick="createPost('announcements')"
>

Create Post

</button>

</div>

<div
id="announcements-posts"
class="posts"
></div>

</div>


<div class="tool">

<h2>Resources</h2>

<div class="adminOnly">

<input
id="resources-title"
placeholder="Title"
>

<textarea
id="resources-content"
placeholder="Content"
></textarea>

<button
onclick="createPost('resources')"
>

Create Post

</button>

</div>

<div
id="resources-posts"
class="posts"
></div>

</div>


<div class="tool">

<h2>Directory</h2>

<div id="agentGrid"></div>

</div>


</div>


<script type="module"
src="app.js"></script>

</body>
</html>
