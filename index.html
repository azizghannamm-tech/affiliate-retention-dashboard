<!DOCTYPE html>
<html>
<head>
  <title>Affiliate Retention System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 30px;
    }

    input, button, select {
      padding: 8px;
      margin: 5px;
      border: none;
      border-radius: 6px;
    }

    button {
      background: #00ffcc;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00ccaa;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      width: 60%;
    }

    .danger { color: #ff4d4d; }
    .warning { color: #ffd633; }
    .good { color: #66ff99; }
  </style>
</head>
<body>

<h1>🚀 Affiliate Retention Dashboard</h1>

<h3>👤 Create / Select Profile</h3>

<input type="text" id="profileName" placeholder="New Profile Name">
<button onclick="createProfile()">Create Profile</button>

<br>

<select id="profileSelect" onchange="loadProfile()">
  <option value="">Select Profile</option>
</select>

<hr>

<div id="appSection" style="display:none;">

  <h3>Add Affiliate</h3>

  <input type="text" id="name" placeholder="Name">
  <input type="number" id="leads" placeholder="Leads">
  <input type="number" id="conv" placeholder="Conversions">
  <input type="number" id="complaints" placeholder="Complaints">
  <button onclick="addAffiliate()">Add</button>

  <br><br>
  <button onclick="sortByScore()">Sort by Score</button>

  <div id="output"></div>

</div>

<script>

let currentProfile = null;
let affiliates = [];

function saveProfiles(profiles) {
  localStorage.setItem("profiles", JSON.stringify(profiles));
}

function getProfiles() {
  return JSON.parse(localStorage.getItem("profiles")) || {};
}

function createProfile() {
  let name = document.getElementById("profileName").value.trim();
  if (!name) return alert("Enter profile name");

  let profiles = getProfiles();

  if (profiles[name]) {
    alert("Profile already exists");
    return;
  }

  profiles[name] = [];
  saveProfiles(profiles);
  updateProfileDropdown();
  alert("Profile Created!");
}

function updateProfileDropdown() {
  let profiles = getProfiles();
  let select = document.getElementById("profileSelect");
  select.innerHTML = '<option value="">Select Profile</option>';

  Object.keys(profiles).forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });
}

function loadProfile() {
  let name = document.getElementById("profileSelect").value;
  if (!name) return;

  currentProfile = name;
  let profiles = getProfiles();
  affiliates = profiles[name] || [];

  document.getElementById("appSection").style.display = "block";
  displayAffiliates();
}

function saveCurrentProfile() {
  if (!currentProfile) return;

  let profiles = getProfiles();
  profiles[currentProfile] = affiliates;
  saveProfiles(profiles);
}

function calculateScore(leads, conv, complaints) {
  let conversionRate = leads === 0 ? 0 : conv / leads;
  return (conversionRate * 70) - (complaints * 5);
}

function getStatus(score) {
  if (score < 10) return {text: "🔥 HIGH RISK", class: "danger"};
  if (score < 25) return {text: "⚠ Moderate", class: "warning"};
  return {text: "✅ Stable", class: "good"};
}

function addAffiliate() {
  if (!currentProfile) return alert("Select a profile first");

  let name = document.getElementById("name").value;
  let leads = parseInt(document.getElementById("leads").value);
  let conv = parseInt(document.getElementById("conv").value);
  let complaints = parseInt(document.getElementById("complaints").value);

  if (!name) return alert("Enter affiliate name");

  let score = calculateScore(leads, conv, complaints);

  affiliates.push({ name, leads, conv, complaints, score });

  saveCurrentProfile();
  displayAffiliates();
}

function displayAffiliates() {
  let output = document.getElementById("output");
  output.innerHTML = "";

  affiliates.forEach(a => {
    let status = getStatus(a.score);

    output.innerHTML += `
      <div class="card">
        <h3>${a.name}</h3>
        Leads: ${a.leads} |
        Conversions: ${a.conv} |
        Complaints: ${a.complaints}
        <br><br>
        Score: ${a.score.toFixed(2)} <br>
        <span class="${status.class}">${status.text}</span>
      </div>
    `;
  });
}

function sortByScore() {
  affiliates.sort((a, b) => b.score - a.score);
  saveCurrentProfile();
  displayAffiliates();
}

updateProfileDropdown();

</script>

</body>
</html>
