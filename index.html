<!DOCTYPE html>
<html>
<head>
  <title>Company Knowledge Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
    }

    header {
      background: #1f2d3d;
      color: white;
      padding: 20px;
      font-size: 22px;
    }

    #loginSection {
      margin-top: 150px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #1f2d3d;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #324a63;
    }

    #mainApp {
      display: none;
      margin-top: 80px;
    }
  </style>
</head>
<body>

<header>
  Company Knowledge Hub
</header>

<div id="loginSection">
  <h2>Internal Access</h2>
  <button id="googleLoginBtn">Sign in with Google</button>
</div>

<div id="mainApp">
  <h2>Welcome 🎉</h2>
  <p id="userEmail"></p>
  <button id="logoutBtn">Logout</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup, 
    onAuthStateChanged, 
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // 🔥 YOUR REAL FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyB8dDInPQRVAs7dkfc8QU3L5qUJtm-2jg",
    authDomain: "affiliate-relations-17687.firebaseapp.com",
    projectId: "affiliate-relations-17687",
    storageBucket: "affiliate-relations-17687.firebasestorage.app",
    messagingSenderId: "642027131905",
    appId: "1:642027131905:web:5f0076ee7b34578b9f9c00",
    measurementId: "G-DVSF596RV0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("googleLoginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginSection = document.getElementById("loginSection");
  const mainApp = document.getElementById("mainApp");
  const userEmail = document.getElementById("userEmail");

  // 🔑 LOGIN
  loginBtn.addEventListener("click", async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      console.error("LOGIN ERROR:", error);
      alert(error.message);
    }
  });

  // 🔄 AUTH STATE LISTENER
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginSection.style.display = "none";
      mainApp.style.display = "block";
      userEmail.textContent = "Logged in as: " + user.email;
    } else {
      loginSection.style.display = "block";
      mainApp.style.display = "none";
    }
  });

  // 🚪 LOGOUT
  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
  });

</script>

</body>
</html>
