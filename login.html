<!DOCTYPE html>
<html>

<head>
<title>Agent Login</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
background:#1e4fa1;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.google{
background:#ea4335;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h2>Agent Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button class="google" id="googleBtn">Sign in with Google</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getAuth,
setPersistence,
browserLocalPersistence,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

const firebaseConfig = {
apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain: "affiliate-relations-17687.firebaseapp.com",
projectId: "affiliate-relations-17687",
storageBucket: "affiliate-relations-17687.firebasestorage.app",
messagingSenderId: "642027131905",
appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)

await setPersistence(auth, browserLocalPersistence)

/* EMAIL LOGIN */

document.getElementById("loginBtn").onclick = async ()=>{

try{

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

window.location.href="index.html"

}catch(err){

alert(err.message)

}

}

/* GOOGLE LOGIN */

document.getElementById("googleBtn").onclick = async ()=>{

try{

const provider=new GoogleAuthProvider()

await signInWithPopup(auth,provider)

window.location.href="index.html"

}catch(err){

alert(err.message)

}

}

</script>

</body>
</html>
