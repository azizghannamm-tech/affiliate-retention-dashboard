<!DOCTYPE html>
<html>
<head>
  <title>Knowledge Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
    }

    header {
      background: #1f2d3d;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav button {
      margin-right: 15px;
      padding: 8px 14px;
      background: transparent;
      color: white;
      border: 1px solid white;
      cursor: pointer;
    }

    nav button:hover {
      background: white;
      color: #1f2d3d;
    }

    .container {
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .hidden {
      display: none;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
    }

    .login-container {
      text-align: center;
      margin-top: 150px;
    }

    .btn-primary {
      padding: 10px 20px;
      background: #1f2d3d;
      color: white;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #324a63;
    }
  </style>
</head>

<body>

<header>
  <h2>Knowledge Hub</h2>
  <div id="userInfo"></div>
</header>

<div class="login-container" id="loginSection">
  <h2>Company Knowledge Hub</h2>
  <button class="btn-primary" id="googleLogin">Sign in with Google</button>
</div>

<div class="container hidden" id="mainApp">

  <nav>
    <button onclick="showHome()">Home</button>
    <button onclick="showUpdates()">Updates</button>
  </nav>

  <div id="homeSection">
    <div class="card">
      <h3>Welcome to the Internal Knowledge Hub</h3>
      <p>All company updates and resources are stored here.</p>
    </div>
  </div>

  <div id="updatesSection" class="hidden">
    <div id="adminEditor" class="card hidden">
      <h3>Create Update</h3>
      <input type="text" id="updateTitle" placeholder="Update Title" style="width:100%; padding:8px;">
      <textarea id="updateContent" placeholder="Write update..."></textarea>
      <button class="btn-primary" onclick="addUpdate()">Publish</button>
    </div>

    <div id="updatesList"></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "affiliate-relations-17687.firebaseapp.com",
    projectId: "affiliate-relations-17687",
    storageBucket: "affiliate-relations-17687.firebasestorage.app",
    messagingSenderId: "642027131905",
    appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("googleLogin");
  const loginSection = document.getElementById("loginSection");
  const mainApp = document.getElementById("mainApp");
  const userInfo = document.getElementById("userInfo");
  const adminEditor = document.getElementById("adminEditor");
  const updatesList = document.getElementById("updatesList");

  let currentRole = "user";

  loginBtn.onclick = async () => {
    await signInWithPopup(auth, provider);
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      loginSection.classList.add("hidden");
      mainApp.classList.remove("hidden");

      userInfo.innerHTML = `
        ${user.email} 
        <button onclick="logout()">Logout</button>
      `;

      const userDoc = await getDoc(doc(db, "users", user.uid));

      if (userDoc.exists()) {
        currentRole = userDoc.data().role;
        if (currentRole === "superadmin" || currentRole === "admin") {
          adminEditor.classList.remove("hidden");
        }
      }

      loadUpdates();
    }
  });

  window.logout = () => {
    signOut(auth);
    location.reload();
  };

  window.showHome = () => {
    document.getElementById("homeSection").classList.remove("hidden");
    document.getElementById("updatesSection").classList.add("hidden");
  };

  window.showUpdates = () => {
    document.getElementById("homeSection").classList.add("hidden");
    document.getElementById("updatesSection").classList.remove("hidden");
  };

  window.addUpdate = async () => {
    const title = document.getElementById("updateTitle").value;
    const content = document.getElementById("updateContent").value;

    if (!title || !content) return alert("Fill all fields");

    await addDoc(collection(db, "updates"), {
      title,
      content,
      createdAt: serverTimestamp()
    });

    document.getElementById("updateTitle").value = "";
    document.getElementById("updateContent").value = "";

    loadUpdates();
  };

  async function loadUpdates() {
    updatesList.innerHTML = "";
    const q = query(collection(db, "updates"), orderBy("createdAt", "desc"));
    const querySnapshot = await getDocs(q);

    querySnapshot.forEach((docSnap) => {
      const data = docSnap.data();
      updatesList.innerHTML += `
        <div class="card">
          <h3>${data.title}</h3>
          <p>${data.content}</p>
        </div>
      `;
    });
  }
</script>

</body>
</html>
