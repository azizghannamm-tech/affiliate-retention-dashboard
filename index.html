<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Affiliate Retention System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#2a2a40);
  color:white;
  margin:0;
  padding:0;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card{
  background:#2f2f4a;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}
input,button{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px 0;
}
button{
  cursor:pointer;
  background:#6c5ce7;
  color:white;
}
button:hover{
  background:#8e7dff;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  padding:10px;
  border-bottom:1px solid #444;
}
.actions button{
  margin-right:5px;
}
.hidden{display:none;}
</style>
</head>
<body>
<div class="container">

<h1>🔥 Affiliate Retention Dashboard</h1>

<div id="authSection" class="card">
  <h2>Login / Register</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

<div class="card">
  <h2>Add Affiliate</h2>
  <input type="text" id="name" placeholder="Affiliate Name"><br>
  <input type="number" id="score" placeholder="Retention Score (0-100)"><br>
  <button onclick="addAffiliate()">Add</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="card">
  <h2>Affiliates</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Score</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="affiliateTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>Retention Analytics</h2>
  <canvas id="chart"></canvas>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
  authDomain: "affiliate-relations-17687.firebaseapp.com",
  projectId: "affiliate-relations-17687",
  storageBucket: "affiliate-relations-17687.firebasestorage.app",
  messagingSenderId: "642027131905",
  appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let chart;

window.register = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await createUserWithEmailAndPassword(auth,email,password);
}

window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth,email,password);
}

window.logout = async function(){
  await signOut(auth);
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser=user;
    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadAffiliates();
  }else{
    document.getElementById("authSection").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }
});

window.addAffiliate = async function(){
  const name = document.getElementById("name").value;
  const score = parseInt(document.getElementById("score").value);
  await addDoc(collection(db,"users",currentUser.uid,"affiliates"),{
    name,
    score
  });
}

function loadAffiliates(){
  const table = document.getElementById("affiliateTable");
  const ref = collection(db,"users",currentUser.uid,"affiliates");

  onSnapshot(ref,(snapshot)=>{
    table.innerHTML="";
    let labels=[];
    let data=[];
    snapshot.forEach(docSnap=>{
      const d=docSnap.data();
      labels.push(d.name);
      data.push(d.score);

      table.innerHTML+=`
        <tr>
          <td>${d.name}</td>
          <td>${d.score}</td>
          <td class="actions">
            <button onclick="editAffiliate('${docSnap.id}','${d.name}',${d.score})">Edit</button>
            <button onclick="deleteAffiliate('${docSnap.id}')">Delete</button>
          </td>
        </tr>`;
    });

    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
      type:"bar",
      data:{
        labels:labels,
        datasets:[{
          label:"Retention Score",
          data:data
        }]
      }
    });
  });
}

window.deleteAffiliate = async function(id){
  await deleteDoc(doc(db,"users",currentUser.uid,"affiliates",id));
}

window.editAffiliate = async function(id,name,score){
  const newName = prompt("Edit Name",name);
  const newScore = prompt("Edit Score",score);
  await updateDoc(doc(db,"users",currentUser.uid,"affiliates",id),{
    name:newName,
    score:parseInt(newScore)
  });
}

</script>
</body>
</html>
