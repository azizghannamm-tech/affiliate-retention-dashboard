<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Agent Hub</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<header>

<h2>Agent Knowledge Hub</h2>

<div class="profileArea">

<img id="agentAvatar" src="" width="40">

<span id="agentName"></span>

<button id="profileBtn">Profile</button>

<div id="profileDropdown">

<p id="agentEmail"></p>
<p id="accessLevel"></p>

<button id="logoutBtn">Logout</button>

</div>

</div>

</header>


<!-- =========================
TABS
========================= -->

<div class="tabs">

<button class="tabButton" data-tab="tools">Tools</button>

<button class="tabButton" data-tab="knowledge">Knowledge</button>

<button class="tabButton" data-tab="agents">Agents</button>

</div>


<!-- =========================
TOOLS
========================= -->

<div id="tools" class="tabContent">

<div class="tool">
<h3>Agent Tools</h3>
<p>Internal tools go here</p>
</div>

</div>


<!-- =========================
KNOWLEDGE
========================= -->

<div id="knowledge" class="tabContent">

<div class="tool">

<h3>Knowledge Base</h3>

<div class="postsContainer" data-section="knowledge"></div>

</div>

</div>


<!-- =========================
AGENT DIRECTORY
========================= -->

<div id="agents" class="tabContent">

<div class="tool">

<h3>Agent Directory</h3>

<div id="agentDirectory">
<div class="agentDirectoryGrid" id="agentGrid"></div>
</div>

</div>

</div>



<script type="module" src="dashboard.js"></script>
