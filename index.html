<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Affiliate Relations Hub</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7fb;
}

/* HEADER */

header{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
}

nav button{
margin-right:10px;
padding:8px 14px;
border:none;
background:#1e4fa1;
color:white;
border-radius:6px;
cursor:pointer;
}

/* PROFILE */

.profile{
font-size:14px;
}

/* CONTENT */

#contentArea{
padding:30px;
}

/* POSTS */

.postCard{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ADMIN PANEL */

#adminPanel{
display:none;
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

#adminPanel input,
#adminPanel textarea,
#adminPanel select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

#adminPanel button{
background:#16a34a;
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<nav>

<button onclick="openSection('home')">Home</button>
<button onclick="openSection('documents')">Documents</button>
<button onclick="openSection('contacts')">Contacts</button>
<button onclick="openSection('tools')">Tools</button>

</nav>

<div class="profile">

<b id="agentName"></b><br>
<span id="agentEmail"></span><br>
Access: <span id="accessLevel"></span>

<br>
<button id="logoutBtn">Logout</button>

</div>

</header>


<!-- ADMIN PANEL -->

<div id="adminPanel">

<h3>Admin Post</h3>

<input id="postTitle" placeholder="Post title">

<select id="postSection">
<option value="home">Home</option>
<option value="documents">Documents</option>
<option value="contacts">Contacts</option>
<option value="tools">Tools</option>
</select>

<textarea id="postContent" rows="6" placeholder="Post content or HTML embed"></textarea>

<input id="postTags" placeholder="tags">

<button id="publishPost">Publish Post</button>

</div>


<!-- CONTENT AREA -->

<div id="contentArea"></div>


<script type="module" src="main.js"></script>

</body>
</html>
