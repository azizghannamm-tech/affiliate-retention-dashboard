<script>
function createTab(section,title){

let widget=""

if(section==="home"){
widget=`
<div class="map">
<div class="zone-card east"><div class="tag">USA</div><div class="zone-name">Eastern Time</div><div class="time" id="est"></div></div>
<div class="zone-card central"><div class="tag">USA</div><div class="zone-name">Central Time</div><div class="time" id="cst"></div></div>
<div class="zone-card mountain"><div class="tag">USA</div><div class="zone-name">Mountain Time</div><div class="time" id="mst"></div></div>
<div class="zone-card pacific"><div class="tag">USA</div><div class="zone-name">Pacific Time</div><div class="time" id="pst"></div></div>
<div class="zone-card dr"><div class="tag">CARIBBEAN</div><div class="zone-name">Dominican Republic</div><div class="time" id="dr"></div></div>
<div class="zone-card jordan"><div class="tag">MENA</div><div class="zone-name">Amman · Jordan</div><div class="time" id="amman"></div></div>
</div>
`
}

/* 👉 ADD TOOL ONLY TO TOOLS TAB */
if(section==="tools"){
widget+=`
<div class="tool">
<h3>Text Box Builder</h3>

<button onclick="addBox('${section}')">Add Text Box</button>
<button onclick="saveBoxes('${section}')">Save Layout</button>

<div class="canvas" id="canvas-${section}" style="position:relative;height:400px;margin-top:15px;border:2px dashed #ccc;border-radius:10px;"></div>
</div>
`
}

return `
<div id="${section}" class="tabContent">
${widget}

<div class="tool">
<h3>${title}</h3>

<input class="postTitle" placeholder="Post title">
<input class="postTags" placeholder="Tags">

<label>
<input type="checkbox" class="postPinned"> Pin post
</label>

<div class="editorToolbar">
<button data-format="bold"><b>B</b></button>
<button data-format="italic"><i>I</i></button>
<button data-format="underline"><u>U</u></button>
</div>

<div class="postContent" contenteditable="true"></div>

<button class="createPostBtn">Publish Post</button>

<input class="postSearch" placeholder="Search posts" style="margin-top:15px;width:100%;padding:8px;">

<div class="postsContainer" data-section="${section}"></div>

</div>
</div>
`
}
</script>
