```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Knowledge Hub</title>

<link
rel="stylesheet"
href="dashboard.css"
>

</head>

<body>


<!-- TOP BAR -->

<header class="topBar">

<div class="logo">
Knowledge Hub
</div>

<div class="profileSection">

<img
id="agentAvatar"
class="avatar"
src=""
>

<div class="profileInfo">

<div id="agentName">
Agent
</div>

<div id="agentEmail">
Loading...
</div>

<div id="accessLevel">
Agent
</div>

</div>


<button id="profileBtn">
☰
</button>


<div
class="dropdown"
id="profileDropdown"
>

<a href="#">
Profile</a>

<button id="logoutBtn">
Logout
</button>

</div>

</div>

</header>


<!-- TABS -->

<div class="tabs">

<button
class="tabBtn"
onclick="showTab('announcements')"
>
Announcements
</button>

<button
class="tabBtn"
onclick="showTab('resources')"
>
Resources
</button>

<button
class="tabBtn"
onclick="showTab('directory')"
>
Directory
</button>

</div>


<!-- MAIN -->

<div class="mainContainer">


<!-- ANNOUNCEMENTS -->

<div
id="announcements"
class="tabContent"
>

<div class="tool">

<h2>
Announcements
</h2>


<div class="adminOnly postCreator">

<input
id="announcements-title"
type="text"
placeholder="Post title"
>

<textarea
id="announcements-content"
placeholder="Write announcement..."
></textarea>

<button
onclick="createPost('announcements')"
>

Create Post

</button>

</div>


<div
id="announcements-posts"
class="posts"
>

<div class="postCard">

<h3>
Affiliate Distribution Update
</h3>

<div class="postMeta">
Logan Diaz • Mar 3rd 2026
</div>

<p>
Find updated affiliates distribution on contacts tab.
</p>

</div>

</div>

</div>

</div>


<!-- RESOURCES -->

<div
id="resources"
class="tabContent"
style="display:none;"
>

<div class="tool">

<h2>
Resources
</h2>


<div class="adminOnly postCreator">

<input
id="resources-title"
type="text"
placeholder="Resource title"
>

<textarea
id="resources-content"
placeholder="Write resource..."
></textarea>

<button
onclick="createPost('resources')"
>

Create Post

</button>

</div>


<div
id="resources-posts"
class="posts"
></div>

</div>

</div>


<!-- DIRECTORY -->

<div
id="directory"
class="tabContent"
style="display:none;"
>

<div class="tool">

<h2>
Agent Directory
</h2>

<div id="agentGrid"></div>

</div>

</div>


</div>


<!-- TAB SCRIPT -->

<script>

function showTab(id){

document
.querySelectorAll(".tabContent")
.forEach(tab=>{

tab.style.display = "none";

});

document.getElementById(id)
.style.display = "block";

}


/* PROFILE DROPDOWN */

const profileBtn =
document.getElementById("profileBtn");

const dropdown =
document.getElementById("profileDropdown");

profileBtn.onclick = ()=>{

dropdown.classList.toggle("show");

};

</script>


<!-- APP -->

<script
type="module"
src="app.js"
></script>

</body>

</html>
```
