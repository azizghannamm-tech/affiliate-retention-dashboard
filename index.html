<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Knowledge Hub V3</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter, Arial;
background:linear-gradient(135deg,#eef2ff,#e0f2fe);
}

/* SIDEBAR */

.sidebar{
position:fixed;
height:100%;
width:240px;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
cursor:pointer;
transition:.2s;
}

.sidebar button:hover{
background:#475569;
}

/* MAIN */

.content{
margin-left:260px;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

/* CARDS */

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* BUTTON */

.btn{
padding:10px 16px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* TAGS */

.tag{
display:inline-block;
background:#e0f2fe;
color:#0369a1;
padding:5px 10px;
border-radius:999px;
margin:5px 5px 0 0;
font-size:12px;
}

/* FILE DROP */

#dropZone{
border:2px dashed #94a3b8;
padding:30px;
border-radius:12px;
text-align:center;
background:#f8fafc;
}

/* LOGIN */

.loginBox{
width:360px;
margin:120px auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

</style>
</head>

<body>

<div id="app"></div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig={

apiKey:"AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain:"affiliate-relations-17687.firebaseapp.com",
projectId:"affiliate-relations-17687",
storageBucket:"affiliate-relations-17687.firebasestorage.app"

}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.firestore()
const storage=firebase.storage()

let editor

/* LOGIN PAGE */

function showLogin(){

document.getElementById("app").innerHTML=`

<div class="loginBox">

<h2>Knowledge Hub Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="emailLogin()">Login</button>

<br><br>

<button class="btn" onclick="googleLogin()">Login with Google</button>

</div>

`

}

function emailLogin(){

const email=document.getElementById("email").value
const pass=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,pass)

}

function googleLogin(){

const provider=new firebase.auth.GoogleAuthProvider()
auth.signInWithPopup(provider)

}

/* AUTH */

auth.onAuthStateChanged(user=>{

if(user){

loadApp(user)

}else{

showLogin()

}

})

/* APP UI */

function loadApp(user){

document.getElementById("app").innerHTML=`

<div class="sidebar">

<h2>Knowledge Hub</h2>

<button onclick="home()">Home</button>
<button onclick="analytics()">Analytics</button>
<button onclick="tools()">Agent Tools</button>
<button onclick="files()">Files</button>

</div>

<div class="content">

<div class="topbar">

<input id="search" placeholder="Search knowledge">

<div>

${user.email}

<button class="btn" onclick="logout()">Logout</button>

</div>

</div>

<div id="main"></div>

</div>

`

home()

}

/* LOGOUT */

function logout(){

auth.signOut()

}

/* HOME */

function home(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Create Knowledge Post</h3>

<input id="title" placeholder="Title">

<input id="tags" placeholder="#contracts #payments">

<div id="editor" style="height:200px"></div>

<div id="dropZone">Drag file here</div>

<br>

<button class="btn" onclick="createPost()">Publish</button>

</div>

<div id="posts"></div>

`

editor=new Quill("#editor",{theme:"snow"})

setupDrop()

loadPosts()

}

/* CREATE POST */

let uploadedFile=""

function createPost(){

const title=document.getElementById("title").value
const content=editor.root.innerHTML
const tags=document.getElementById("tags").value.split(" ")

db.collection("posts").add({

title,
content,
tags,
file:uploadedFile,
date:Date.now()

})

}

/* LOAD POSTS */

function loadPosts(){

db.collection("posts").orderBy("date","desc").onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

const p=doc.data()

let tagsHTML=""

p.tags.forEach(t=>{
tagsHTML+=`<span class="tag">${t}</span>`
})

html+=`

<div class="card">

<h3>${p.title}</h3>

<div>${p.content}</div>

${tagsHTML}

<br><br>

${p.file ? `<a href="${p.file}" target="_blank">Attachment</a>` : ""}

<br><br>

<button onclick="deletePost('${doc.id}')">Delete</button>

</div>

`

})

document.getElementById("posts").innerHTML=html

})

}

/* DELETE */

function deletePost(id){

db.collection("posts").doc(id).delete()

}

/* FILE DROP */

function setupDrop(){

const zone=document.getElementById("dropZone")

zone.addEventListener("dragover",e=>{
e.preventDefault()
})

zone.addEventListener("drop",e=>{

e.preventDefault()

const file=e.dataTransfer.files[0]

const ref=storage.ref("uploads/"+file.name)

ref.put(file).then(()=>{

ref.getDownloadURL().then(url=>{

uploadedFile=url

alert("File uploaded")

})

})

})

}

/* ANALYTICS */

function analytics(){

db.collection("posts").get().then(s=>{

document.getElementById("main").innerHTML=`

<div class="card">

<h2>Analytics</h2>

<p>Total Posts: ${s.size}</p>

</div>

`

})

}

/* AGENT TOOLS */

function tools(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Debt Settlement Calculator</h3>

<input id="debt" placeholder="Debt Amount">

<button class="btn" onclick="calc()">Calculate</button>

<div id="result"></div>

</div>

`

}

function calc(){

const d=document.getElementById("debt").value

document.getElementById("result").innerHTML=

"Estimated monthly: $" + (d*0.03).toFixed(2)

}

/* FILE PAGE */

function files(){

document.getElementById("main").innerHTML=`

<div class="card">

<h2>Uploaded Files</h2>

<p>Files appear inside posts.</p>

</div>

`

}

</script>

</body>
</html>
