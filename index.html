<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Affiliate Relations</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-left">
<button onclick="openSection('home')">Home</button>
<button onclick="openSection('documents')">Documents</button>
<button onclick="openSection('contacts')">Contacts</button>
<button onclick="openSection('tools')">Tools</button>
</div>

<div class="nav-right">
<div id="agentEmail"></div>
<div>Access: <span id="accessLevel"></span></div>
<button id="logoutBtn">Logout</button>
</div>

</div>


<!-- MAIN CONTENT -->

<div class="main-container">

<div id="home" class="section">
<h2>Home</h2>
<div id="homePosts"></div>
</div>

<div id="documents" class="section" style="display:none;">
<h2>Documents</h2>
<div id="documentsPosts"></div>
</div>

<div id="contacts" class="section" style="display:none;">
<h2>Contacts</h2>
<div id="contactsPosts"></div>
</div>

<div id="tools" class="section" style="display:none;">
<h2>Tools</h2>
<div id="toolsPosts"></div>
</div>

</div>


<!-- ADMIN PANEL -->

<div id="adminPanel" style="display:none;">

<h3>Create Post</h3>

<input id="postTitle" placeholder="Title">

<select id="postSection">
<option value="home">Home</option>
<option value="documents">Documents</option>
<option value="contacts">Contacts</option>
<option value="tools">Tools</option>
</select>

<textarea id="postContent" placeholder="Content"></textarea>

<input id="postTags" placeholder="Tags">

<button id="publishPost">Publish</button>

</div>


<script type="module" src="app.js"></script>

</body>
</html>
