<!DOCTYPE html>
<html>

<head>
<title>Agent Login</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
background:#1e4fa1;
color:white;
border-radius:6px;
cursor:pointer;
}

.google{
background:#ea4335;
margin-top:10px;
}

</style>
</head>


<body>

<div class="card">

<h2>Agent Login</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password" type="password">

<button onclick="login()">Login</button>

<button class="google" onclick="googleLogin()">Sign in with Google</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

const firebaseConfig = {

apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
authDomain: "affiliate-relations-17687.firebaseapp.com",
projectId: "affiliate-relations-17687",
storageBucket: "affiliate-relations-17687.firebasestorage.app",
messagingSenderId: "642027131905",
appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"

}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)


window.login = async () => {

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

window.location="index.html"

}


window.googleLogin = async () => {

const provider=new GoogleAuthProvider()

await signInWithPopup(auth,provider)

window.location="index.html"

}

</script>

</body>
</html>
