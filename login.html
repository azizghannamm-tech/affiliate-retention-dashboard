<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agent Login</title>

<style>
body{
font-family: Arial;
background:#f4f7fb;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.loginBtn{
background:#2e5aac;
color:white;
}

.googleBtn{
background:#db4437;
color:white;
}
</style>

</head>

<body>

<div class="loginBox">

<h2>Agent Login</h2>

<input type="email" id="email" placeholder="Email" autocomplete="email">
<input type="password" id="password" placeholder="Password" autocomplete="current-password">

<button class="loginBtn" onclick="login()">Login</button>

<button class="googleBtn" onclick="googleLogin()">Login with Google</button>

<p id="error" style="color:red;"></p>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
