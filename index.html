<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Affiliate Retention Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg,#6c5ce7,#00cec9,#0984e3,#fd79a8);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color:white;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-right:10px;
  background:linear-gradient(45deg,#ff6ec4,#7873f5);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  text-align:left;
}

th{
  border-bottom:1px solid rgba(255,255,255,0.3);
}

.hidden{display:none;}

.logout{
  float:right;
}

</style>
</head>
<body>

<div class="container">

<h1>🚀 Affiliate Retention Pro</h1>

<div id="authSection" class="card">
<h2>Login / Register</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="dashboard" class="hidden">

<div class="card">
<button class="logout" onclick="logout()">Logout</button>
<h2>Add Affiliate</h2>
<input type="text" id="name" placeholder="Affiliate Name">
<input type="number" id="score" placeholder="Retention Score (0-100)">
<button onclick="addAffiliate()">Add Affiliate</button>
</div>

<div class="card">
<h2>Affiliates</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Score</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="affiliateTable"></tbody>
</table>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8dDTnpPQVRAs7dkfc8QU3L5qUJtm-2jg",
  authDomain: "affiliate-relations-17687.firebaseapp.com",
  projectId: "affiliate-relations-17687",
  storageBucket: "affiliate-relations-17687.firebasestorage.app",
  messagingSenderId: "642027131905",
  appId: "1:642027131905:web:5f0076ee7b34578b9f9c00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser;
let chart;

window.register = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.googleLogin = async ()=>{
  await signInWithPopup(auth,provider);
};

window.logout = async ()=>{
  await signOut(auth);
};

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    authSection.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadAffiliates();
  }else{
    authSection.classList.remove("hidden");
    dashboard.classList.add("hidden");
  }
});

window.addAffiliate = async ()=>{
  await addDoc(collection(db,"users",currentUser.uid,"affiliates"),{
    name:name.value,
    score:parseInt(score.value)
  });
};

function loadAffiliates(){
  const ref=collection(db,"users",currentUser.uid,"affiliates");
  onSnapshot(ref,snap=>{
    affiliateTable.innerHTML="";
    let labels=[];
    let data=[];
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      labels.push(d.name);
      data.push(d.score);

      affiliateTable.innerHTML+=`
      <tr>
        <td>${d.name}</td>
        <td>${d.score}</td>
        <td>
          <button onclick="editAffiliate('${docSnap.id}','${d.name}',${d.score})">Edit</button>
          <button onclick="deleteAffiliate('${docSnap.id}')">Delete</button>
        </td>
      </tr>`;
    });

    if(chart) chart.destroy();
    chart=new Chart(chart,{
      type:"bar",
      data:{labels,datasets:[{label:"Retention",data}]}
    });
  });
}

window.deleteAffiliate = async(id)=>{
  await deleteDoc(doc(db,"users",currentUser.uid,"affiliates",id));
};

window.editAffiliate = async(id,n,s)=>{
  const newName=prompt("Name",n);
  const newScore=prompt("Score",s);
  await updateDoc(doc(db,"users",currentUser.uid,"affiliates",id),{
    name:newName,
    score:parseInt(newScore)
  });
};

</script>

</body>
</html>
